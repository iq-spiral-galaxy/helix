<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Helix</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <a class="brand" href="#/">
        <svg class="brand-mark" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
          <!-- 이중 나선: 두 가닥(Layer=파랑, Question=세이지)이 시간축을 따라 꼬인다.
               앞/뒤 세그먼트 분리 = 입체 교차, 반복 그라디언트가 흐름과 함께 이동 = 가닥을 타고 흐르는 빛. -->
          <defs>
            <linearGradient id="hxa" x1="0" y1="0" x2="0" y2="16" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
              <stop offset="0%" stop-color="#5e9bff"/>
              <stop offset="50%" stop-color="#9fd8f5"/>
              <stop offset="100%" stop-color="#5e9bff"/>
            </linearGradient>
            <linearGradient id="hxb" x1="0" y1="8" x2="0" y2="24" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
              <stop offset="0%" stop-color="#7fb39a"/>
              <stop offset="50%" stop-color="#b5e8cd"/>
              <stop offset="100%" stop-color="#7fb39a"/>
            </linearGradient>
            <radialGradient id="hxh" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#5e9bff" stop-opacity="0.18"/>
              <stop offset="55%" stop-color="#7fb39a" stop-opacity="0.08"/>
              <stop offset="100%" stop-color="#5e9bff" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <!-- 성운 헤일로 — 나선 뒤에서 은은하게 맥동 -->
          <circle class="brand-halo" cx="12" cy="12" r="11.5" fill="url(#hxh)"/>
          <g class="brand-flow" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="rgba(230,232,236,0.2)" stroke-width="1.1"
              d="M7.6 -12 L16.4 -12 M7.6 -4 L16.4 -4 M7.6 4 L16.4 4 M7.6 12 L16.4 12 M7.6 20 L16.4 20 M7.6 28 L16.4 28 M7.6 36 L16.4 36"/>
            <path stroke="url(#hxa)" stroke-width="1.3" opacity="0.32"
              d="M12.00 -8.0 L8.77 -6.4 L6.77 -4.8 L6.77 -3.2 L8.77 -1.6 L12.00 -0.0 M12.00 8.0 L8.77 9.6 L6.77 11.2 L6.77 12.8 L8.77 14.4 L12.00 16.0 M12.00 24.0 L8.77 25.6 L6.77 27.2 L6.77 28.8 L8.77 30.4 L12.00 32.0"/>
            <path stroke="url(#hxb)" stroke-width="1.3" opacity="0.32"
              d="M12.00 -16.0 L8.77 -14.4 L6.77 -12.8 L6.77 -11.2 L8.77 -9.6 L12.00 -8.0 M12.00 0.0 L8.77 1.6 L6.77 3.2 L6.77 4.8 L8.77 6.4 L12.00 8.0 M12.00 16.0 L8.77 17.6 L6.77 19.2 L6.77 20.8 L8.77 22.4 L12.00 24.0 M12.00 32.0 L8.77 33.6 L6.77 35.2 L6.77 36.8 L8.77 38.4 L12.00 40.0"/>
            <path stroke="url(#hxa)" stroke-width="1.7"
              d="M12.00 -16.0 L15.23 -14.4 L17.23 -12.8 L17.23 -11.2 L15.23 -9.6 L12.00 -8.0 M12.00 0.0 L15.23 1.6 L17.23 3.2 L17.23 4.8 L15.23 6.4 L12.00 8.0 M12.00 16.0 L15.23 17.6 L17.23 19.2 L17.23 20.8 L15.23 22.4 L12.00 24.0 M12.00 32.0 L15.23 33.6 L17.23 35.2 L17.23 36.8 L15.23 38.4 L12.00 40.0"/>
            <path stroke="url(#hxb)" stroke-width="1.7"
              d="M12.00 -8.0 L15.23 -6.4 L17.23 -4.8 L17.23 -3.2 L15.23 -1.6 L12.00 -0.0 M12.00 8.0 L15.23 9.6 L17.23 11.2 L17.23 12.8 L15.23 14.4 L12.00 16.0 M12.00 24.0 L15.23 25.6 L17.23 27.2 L17.23 28.8 L15.23 30.4 L12.00 32.0"/>
          </g>
          <!-- 잔별 — 나선을 따라 피어올라 사라지는 입자 -->
          <g class="brand-dust">
            <circle class="d1" cx="5.6" cy="21" r="0.7" fill="#9fd8f5"/>
            <circle class="d2" cx="18.6" cy="22.5" r="0.55" fill="#b5e8cd"/>
            <circle class="d3" cx="9.2" cy="23" r="0.5" fill="#8ab8ff"/>
          </g>
        </svg>
        <span class="brand-name">Helix</span>
      </a>
      <button class="side-search" id="search-trigger" type="button" aria-label="검색">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span>검색</span>
        <kbd>⌘K</kbd>
      </button>
      <nav class="side-nav">
        <a href="#/" data-nav="subjects">나선 일지</a>
        <a href="#/map" data-nav="map">나선 지도</a>
        <a href="#/q" data-nav="questions">남은 질문<span class="count" id="q-count"></span></a>
      </nav>
      <div class="side-label mono-label">나선</div>
      <div class="side-list" id="side-list"></div>
      <div class="side-foot" id="side-foot"></div>
    </aside>
    <div class="workspace">
      <div class="tabbar">
        <button class="tnav" id="nav-back" aria-label="뒤로" title="뒤로">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="tnav" id="nav-fwd" aria-label="앞으로" title="앞으로">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <div class="tabs" id="tabs"></div>
        <button class="tnav" id="tab-new" aria-label="새 탭" title="새 탭">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <main id="app" aria-live="polite"></main>
    </div>
  </div>
  <div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-label="검색" hidden>
    <div class="search-panel">
      <div class="search-head">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="search-input" type="text" placeholder="나선 · layer · 질문 검색…" autocomplete="off" spellcheck="false" />
        <kbd>esc</kbd>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
  <script src="/app.js" type="module"></script>
</body>
</html>
